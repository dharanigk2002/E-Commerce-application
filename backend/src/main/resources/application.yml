spring:
  application:
    name: ecommerce-backend
  main:
    banner-mode: off
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ecommerce}
    username: ${DB_USERNAME:ecommerce}
    password: ${DB_PASSWORD:ecommerce}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    product-image-folder: ${CLOUDINARY_PRODUCT_IMAGE_FOLDER:ecommerce/products}
  jwt:
    secret: ${JWT_SECRET:local-development-secret-key-that-is-at-least-32-bytes}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

logging:
  level:
    root: warn
